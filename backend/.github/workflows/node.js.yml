# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions
name: Tubulu II Backend Deployment

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-20.04

    strategy:
      matrix:
        node-version: [14.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v2    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}
    - name: copy build via ssh
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.STAGING_HOST }}         
        username: 'root'
        password: ${{ secrets.STAGING_PASSWORD }}
        source: "./"
        target: "/root/tubulu-bot"
    - name: copy build via ssh
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.STAGING_HOST }}         
        username: 'root'
        password: ${{ secrets.STAGING_PASSWORD }}
        script: cd /root/tubulu-bot && docker stop tubulu-bot-integrations && docker rm tubulu-bot-integrations && docker build . -t tubulu-bot-integrations && docker run -p 3008:3008 -d --name tubulu-bot-integrations tubulu-bot-integrations
